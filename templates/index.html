<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Quiz App</title>

    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="container">

    <h1>🧠 AI Quiz App</h1>

    <div id="setup">

        <input
            type="text"
            id="subject"
            placeholder="Enter Subject">

        <select id="difficulty">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select>

        <input
            type="number"
            id="questions"
            value="5"
            min="1"
            max="10">

        <button id="generateBtn">
            Generate Quiz
        </button>

    </div>

    <div id="quiz" style="display:none;">

        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="submitBtn">
            Submit Answer
        </button>

        <p id="feedback"></p>

        <button id="nextBtn" style="display:none;">
            Next Question
        </button>

        <h3 id="score"></h3>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
